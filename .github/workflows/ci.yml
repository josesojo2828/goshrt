name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: goshrt
          POSTGRES_PASSWORD: goshrt
          POSTGRES_DB: goshrt
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          check-latest: true

      - name: Run migrations
        run: |
          go install -tags 'postgres' github.com/golang-migrate/migrate/v4/cmd/migrate@latest
          migrate -database "postgres://goshrt:goshrt@localhost:5432/goshrt?sslmode=disable" \
                   -path internal/store/postgres/migrations up

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -v -race -count=1 ./...
        env:
          POSTGRES_DSN: "postgres://goshrt:goshrt@localhost:5432/goshrt?sslmode=disable"
          REDIS_ADDR: "localhost:6379"
          PORT: ":9090"
