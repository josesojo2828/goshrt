version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: goshrt_postgres
    environment:
      POSTGRES_USER: goshrt
      POSTGRES_PASSWORD: goshrt
      POSTGRES_DB: goshrt
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U goshrt"]
    networks:
      - goshrt-network

  redis:
    image: redis:7-alpine
    container_name: goshrt_redis
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -h localhost PING"]
    networks:
      - goshrt-network

  prometheus:
    image: prom/prometheus:latest
    container_name: goshrt_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - goshrt-network

  grafana:
    image: grafana/grafana:latest
    container_name: goshrt_grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ysecreto123
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana:/etc/grafana/provisioning
    depends_on:
      - prometheus
    networks:
      - goshrt-network

  goshrt:
    build: .
    container_name: goshrt_service
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      POSTGRES_DSN: "postgres://goshrt:goshrt@postgres:5432/goshrt?sslmode=disable"
      REDIS_ADDR: "redis:6379"
    depends_on:
      - postgres
      - redis
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
    networks:
      - goshrt-network

  # Proxi-pulse (placeholder - build/push your own image)
  proxi-pulse:
    image: ghcr.io/yourusername/proxi-pulse:latest
    container_name: proxi_pulse
    build:
      context: ./proxi-pulse
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      PROXI_PORT: "8081"
      MAXMIND_DB_PATH: "/opt/proxi-pulse/GeoLite2-Country.mmdb"
    volumes:
      - ./proxi-pulse/GeoLite2-Country.mmdb:/opt/proxi-pulse/GeoLite2-Country.mmdb:ro
    networks:
      - goshrt-network

networks:
  goshrt-network:
    driver: bridge

volumes:
  postgres-data:
  prometheus-data: