services:
  postgres:
    image: postgres:16-alpine
    container_name: goshrt_postgres
    environment:
      POSTGRES_USER: goshrt
      POSTGRES_PASSWORD: goshrt
      POSTGRES_DB: goshrt
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U goshrt"]
    networks:
      - goshrt-network

  redis:
    image: redis:7-alpine
    container_name: goshrt_redis
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -h localhost PING"]
    networks:
      - goshrt-network

  prometheus:
    image: prom/prometheus:latest
    container_name: goshrt_prometheus
    ports:
      - "15051:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - goshrt-network

  grafana:
    image: grafana/grafana:latest
    container_name: goshrt_grafana
    ports:
      - "15052:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana:/etc/grafana/provisioning
    depends_on:
      - prometheus
    networks:
      - goshrt-network

  migration:
    image: migrate/migrate:v4.18.2
    container_name: goshrt_migration
    command:
      - "-path=/migrations"
      - "-database=postgres://goshrt:goshrt@postgres:5432/goshrt?sslmode=disable"
      - "up"
    volumes:
      - ./internal/store/postgres/migrations:/migrations
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - goshrt-network
    restart: on-failure

  goshrt:
    build: .
    container_name: goshrt_service
    ports:
      - "15050:8080"
    environment:
      PORT: "8080"
      POSTGRES_DSN: "postgres://goshrt:goshrt@postgres:5432/goshrt?sslmode=disable"
      REDIS_ADDR: "redis:6379"
    depends_on:
      migration:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
    networks:
      - goshrt-network

networks:
  goshrt-network:
    driver: bridge

volumes:
  postgres-data:
  prometheus-data: